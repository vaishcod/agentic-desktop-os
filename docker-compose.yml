version: '3.8'

services:
  db:
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: antigravity
      POSTGRES_PASSWORD: password
      POSTGRES_DB: antigravity_db
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # Note: Ollama is usually run locally on the host to leverage GPU
  # But we can include it here if the user prefers docker
  # ollama:
  #   image: ollama/ollama
  #   ports:
  #     - "11434:11434"

volumes:
  postgres_data:
  qdrant_data:
